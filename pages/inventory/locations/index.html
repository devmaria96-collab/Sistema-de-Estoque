<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Locais - Sistema Controle de Estoque</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="left-section">
                <span class="greeting">Olá, Maria</span>
            </div>
            <div class="center-section">
                <nav class="breadcrumb" id="breadcrumb">
                    <span class="breadcrumb-item active">Gestão de Locais</span>
                </nav>
            </div>
            <div class="right-section">
                <button class="theme-toggle" id="theme-toggle" title="Alternar tema">
                    <span class="theme-icon">◐</span>
                </button>
                <button class="logout-btn" id="logout-btn" title="Sair do sistema">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
                        <path d="M12 2v4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </button>
                <div class="user-dropdown dropdown" id="user-dropdown">
                    <button class="user-btn dropdown-btn" id="user-btn">
                        <span class="user-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
                                <circle cx="12" cy="8" r="3" stroke="currentColor" stroke-width="2"/>
                                <path d="M6.168 18.849A6 6 0 0 1 12 16a6 6 0 0 1 5.832 2.849" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            </svg>
                        </span>
                    </button>
                    <div class="dropdown-content" id="user-dropdown-content">
                        <a href="#" class="dropdown-item" id="perfil-btn">
                            <span class="item-icon">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <circle cx="12" cy="8" r="5" stroke="currentColor" stroke-width="2"/>
                                    <path d="M20 21a8 8 0 0 0-16 0" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                                </svg>
                            </span>
                            Perfil
                        </a>
                        <a href="#" class="dropdown-item" id="config-btn">
                            <span class="item-icon">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" stroke="currentColor" stroke-width="2"/>
                                    <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
                                </svg>
                            </span>
                            Configurações
                        </a>
                        <a href="#" class="dropdown-item" id="sair-btn">
                            <span class="item-icon">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                    <polyline points="16,17 21,12 16,7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                    <line x1="21" y1="12" x2="9" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                            </span>
                            Sair
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="main-content">
        <!-- Seção de Locais -->
        <section id="locais" class="locais-section active">
            <!-- Header com título e botões -->
            <div class="filters-header">
                <h2 class="page-title">Gestão de Locais</h2>
                <div class="header-buttons">
                    <button class="btn-export-local" id="btn-voltar-dashboard">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 1C7.03 1 3 5.03 3 10V20C3 21.66 4.34 23 6 23C7.66 23 9 21.66 9 20V17.5L11.41 19.91C11.8 20.3 12.2 20.3 12.59 19.91C12.98 19.52 12.98 18.89 12.59 18.5L9.71 15.62C9.32 15.23 8.69 15.23 8.3 15.62C7.91 16.01 7.91 16.64 8.3 17.03L9 17.73V20C9 20.55 8.55 21 8 21H6C5.45 21 5 20.55 5 20V10C5 6.13 8.13 3 12 3C15.87 3 19 6.13 19 10V12C19 12.55 19.45 13 20 13C20.55 13 21 12.55 21 12V10C21 5.03 16.97 1 12 1Z"/>
                            <circle cx="12" cy="7" r="2"/>
                            <path d="M14.5 11C13.12 11 12 12.12 12 13.5C12 14.88 13.12 16 14.5 16H18.5C19.88 16 21 14.88 21 13.5C21 12.12 19.88 11 18.5 11H14.5Z"/>
                            <path d="M18 13.5L16.5 12L18 10.5"/>
                        </svg>
                    </button>
                    <button class="btn-add-local" id="btn-adicionar-local">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Filtros principais -->
            <div class="main-filters" id="main-filters">
                <div class="filter-row">
                    <div class="filter-group">
                        <label>Nome do Local:</label>
                        <input type="text" class="filter-input-new" placeholder="Digite o nome do local" id="nome-input">
                    </div>
                    
                    <div class="filter-group">
                        <label>Descrição:</label>
                        <input type="text" class="filter-input-new" placeholder="Digite a descrição" id="descricao-input">
                    </div>
                    
                    <div class="filter-actions">
                        <button class="btn-loading" id="btn-buscar">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2"/>
                                <path d="m21 21-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                            Buscar
                        </button>
                        <button class="btn-clear" id="btn-limpar">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                            Limpar
                        </button>
                    </div>
                </div>

                <!-- Filtro avançado -->
                <div class="advanced-filter">
                    <button class="btn-advanced-filter" id="btn-filtro-avancado">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        Filtro avançado
                    </button>
                </div>
            </div>

            <!-- Área de conteúdo -->
            <div class="content-area">
                <!-- Header da tabela -->
                <div class="table-header">
                    <div class="table-header-content">
                        <div class="table-pagination-top">
                            <div class="pagination-controls">
                                <button class="pagination-btn">«</button>
                                <button class="pagination-btn">‹</button>
                                <button class="pagination-btn active">1</button>
                                <button class="pagination-btn">›</button>
                                <button class="pagination-btn">»</button>
                            </div>
                            <div class="page-controls">
                                <span>Ir para:</span>
                                <input type="number" class="page-input" value="1" min="1">
                            </div>
                            <div class="items-per-page">
                                <span>Itens por página:</span>
                                <select class="items-select">
                                    <option value="10" selected>10</option>
                                    <option value="25">25</option>
                                    <option value="50">50</option>
                                    <option value="100">100</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Tabela -->
                <div class="locais-table-container">
                    <table class="locais-table" id="locais-table">
                        <thead>
                            <tr>
                                <th class="checkbox-col">
                                    <input type="checkbox" id="select-all">
                                </th>
                                <th class="id-col">ID</th>
                                <th class="name-col">Nome do Local</th>
                                <th class="description-col">Descrição</th>
                                <th class="status-col">Status</th>
                                <th class="actions-col">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="locais-tbody">
                            <!-- Locais serão inseridos aqui via JavaScript -->
                        </tbody>
                    </table>
                </div>

                <!-- Footer da tabela -->
                <div class="table-footer">
                    <div class="table-footer-content">
                        <div class="table-pagination-bottom">
                            <div class="pagination-controls">
                                <button class="pagination-btn">«</button>
                                <button class="pagination-btn">‹</button>
                                <button class="pagination-btn active">1</button>
                                <button class="pagination-btn">›</button>
                                <button class="pagination-btn">»</button>
                            </div>
                            <div class="page-controls">
                                <span>Ir para:</span>
                                <input type="number" class="page-input" value="1" min="1">
                            </div>
                            <div class="items-per-page">
                                <span>Itens por página:</span>
                                <select class="items-select">
                                    <option value="10" selected>10</option>
                                    <option value="25">25</option>
                                    <option value="50">50</option>
                                    <option value="100">100</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Modal para adicionar/editar local -->
    <div id="modal-local" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-local-title">Adicionar Local</h3>
                <span class="close" id="close-local">&times;</span>
            </div>
            <form id="local-form" class="local-form">
                <div class="form-group">
                    <label for="nome-local">Nome do Local:</label>
                    <input type="text" id="nome-local" name="nome-local" required>
                </div>
                <div class="form-group">
                    <label for="descricao-local">Descrição:</label>
                    <textarea id="descricao-local" name="descricao-local" rows="3" placeholder="Descreva o local"></textarea>
                </div>
                <div class="form-group">
                    <label for="endereco">Endereço:</label>
                    <input type="text" id="endereco" name="endereco">
                </div>
                <div class="form-group">
                    <label for="capacidade">Capacidade:</label>
                    <input type="number" id="capacidade" name="capacidade" min="1">
                </div>
                <div class="form-group">
                    <label for="responsavel">Responsável:</label>
                    <input type="text" id="responsavel" name="responsavel">
                </div>
                <div class="form-group">
                    <label for="status-local">Status:</label>
                    <select id="status-local" name="status-local" required>
                        <option value="Ativo">Ativo</option>
                        <option value="Inativo">Inativo</option>
                        <option value="Manutenção">Em Manutenção</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-secondary" id="btn-cancelar-local">Cancelar</button>
                    <button type="submit" class="btn-primary">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal de confirmação de exclusão -->
    <div id="modal-confirmacao" class="modal">
        <div class="modal-content modal-confirmacao-content">
            <div class="modal-header-confirmacao">
                <div class="warning-icon">⚠️</div>
                <h3>Confirmar Exclusão</h3>
            </div>
            <div class="modal-body-confirmacao">
                <p>Tem certeza que deseja excluir este local?</p>
                <p class="warning-text">Esta ação não poderá ser desfeita.</p>
            </div>
            <div class="form-actions-confirmacao">
                <button type="button" class="btn-warning-improved" id="btn-cancelar-exclusao">
                    <span class="btn-icon">←</span>
                    Voltar
                </button>
                <button type="button" class="btn-danger-improved" id="btn-confirmar-exclusao">
                    <span class="btn-icon">🗑️</span>
                    Sim, excluir
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
